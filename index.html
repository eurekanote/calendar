<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全球股市实时看板</title>
    <!-- PWA / 移动端桌面化配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="股市看板">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/128/9729/9729300.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/128/9729/9729300.png">
    
    
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --apple-blue: #007aff;
            --apple-red: #ff3b30;
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
            --border-color: #e5e5ea;
            
            /* 三色底色 */
            --tag-a-bg: #6366f1; /* A股紫色 */
            --tag-h-bg: #f59e0b; /* 港股橙色 */
            --tag-u-bg: #10b981; /* 美股绿色 */
            --tag-closed-bg: #e5e5ea;
            --tag-closed-text: #8e8e93;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 20px; font-weight: 600; color: var(--apple-blue); }

        .clocks-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .clock-card {
            background: #fbfbfd;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .time-val {
            font-family: "SF Mono", "Courier New", monospace;
            font-size: 32px;
            font-weight: 700;
            margin: 5px 0;
            letter-spacing: -1px;
        }
        .date-val { font-size: 13px; color: var(--text-sub); }

        .calendar-container {
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
        }
        .cal-header {
            padding: 12px 15px;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .cal-controls { display: flex; align-items: center; gap: 6px; }
        .cal-select, .cal-btn {
            appearance: none;
            background-color: #f2f2f7;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--apple-blue);
            cursor: pointer;
            outline: none;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--border-color);
            gap: 1px;
        }
        .weekday {
            background: #f9f9fb;
            padding: 8px 0;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-sub);
        }
        .day-cell {
            background: #fff;
            min-height: 100px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .day-num { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
        .today .day-num {
            color: #fff;
            background: var(--apple-red);
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .other-month { color: #d1d1d6; }
        .other-month .market-tag { opacity: 0.3; }

        .market-tag {
            font-size: 9px;
            font-weight: 600;
            padding: 2px 4px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            white-space: nowrap;
        }
        .tag-a { background-color: var(--tag-a-bg); color: white; }
        .tag-h { background-color: var(--tag-h-bg); color: white; }
        .tag-u { background-color: var(--tag-u-bg); color: white; }
        .tag-closed {
            background-color: var(--tag-closed-bg);
            color: var(--tag-closed-text);
        }

        .info-icon {
            display: inline-flex;
            width: 12px;
            height: 12px;
            background: rgba(0,0,0,0.08);
            color: #666;
            border-radius: 50%;
            justify-content: center;
            align-items: center;
            margin-left: 2px;
            cursor: pointer;
            font-size: 8px;
        }

        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        #modal {
            background: #fff;
            padding: 24px;
            border-radius: 18px;
            max-width: 280px;
            width: 85%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        #modal h3 { font-size: 17px; margin-bottom: 10px; color: var(--apple-blue); }
        #modal p { font-size: 13px; color: #666; margin-bottom: 18px; line-height: 1.5; }
        .modal-btn {
            background: var(--apple-blue);
            color: #fff;
            border: none;
            padding: 8px 25px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
        }

        .sync-info {
            margin-top: 12px;
            font-size: 10px;
            color: var(--text-sub);
            text-align: right;
        }

        @media (max-width: 600px) {
            body { padding: 0; }
            .container { 
                padding: 10px 0px; 
                border-radius: 0; 
                box-shadow: none;
                width: 100vw;
            }
            .clocks-row { 
                grid-template-columns: 1fr; 
                gap: 10px; 
                padding: 0 10px;
            }
            .time-val { font-size: 28px; }
            .calendar-container {
                border-left: none;
                border-right: none;
                border-radius: 0;
            }
            .cal-header { padding: 10px 5px; justify-content: center; }
            .day-cell { min-height: 85px; padding: 4px 2px; }
            .market-tag { font-size: 8px; letter-spacing: -0.5px; padding: 1px 2px; }
            .weekday { font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>全球金融市场实时看板</h1>
    </div>

    <div class="clocks-row">
        <div class="clock-card">
            <div class="date-val">中国标准时间 (CST)</div>
            <div id="cn-time" class="time-val">00:00:00</div>
            <div id="cn-date" class="date-val">正在同步...</div>
        </div>
        <div class="clock-card">
            <div class="date-val">美东时间 (EST/EDT)</div>
            <div id="us-time" class="time-val">00:00:00</div>
            <div id="us-date" class="date-val">正在同步...</div>
        </div>
    </div>

    <div class="calendar-container">
        <div class="cal-header">
            <div class="cal-controls">
                <select id="year-select" class="cal-select"></select>
                <select id="month-select" class="cal-select"></select>
                <button id="today-btn" class="cal-btn">今天</button>
            </div>
            <div style="font-size: 11px; color: var(--text-sub);">
                彩色：开盘 · 灰色：休市
            </div>
        </div>
        <div class="cal-grid" id="calendar-grid">
            <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
            <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div>
            <div class="weekday">六</div>
        </div>
    </div>

    <div class="sync-info" id="sync-status">正在连接日历服务器...</div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <h3 id="modal-title">休市详情</h3>
        <p id="modal-desc"></p>
        <button class="modal-btn" onclick="closeModal()">我知道了</button>
    </div>
</div>

<script>
    // 离线支持 - Service Worker 注册 (使用内联 Blob 绕过外部文件需求)
    if ('serviceWorker' in navigator) {
        const swCode = `
            const CACHE_NAME = 'market-v1';
            self.addEventListener('install', (e) => {
                e.waitUntil(caches.open(CACHE_NAME).then((cache) => cache.addAll([location.href])));
            });
            self.addEventListener('fetch', (e) => {
                e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request)));
            });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(console.warn);
    }

    const ICS_URLS = {
        a: "https://calendars.icloud.com/holidays/cn_zh.ics",
        us: "https://ics.calendarlabs.com/577/69d4aaa8/Nyse_Market_Holidays.ics",
        hk: "https://ics.calendarlabs.com/581/34611917/Hkex_Market_Holidays.ics"
    };

    const BACKUP_HOLIDAYS = {
        a: { "2026-05-01": "劳动节", "2026-05-04": "五一调休休市", "2026-05-05": "五一调休休市" },
        us: { "2026-05-25": "Memorial Day (阵亡将士纪念日)" },
        hk: { "2026-05-01": "劳动节", "2026-05-25": "佛诞" }
    };

    // 从 LocalStorage 恢复数据 (实现数据缓存)
    let holidayMaps = { a: new Map(), us: new Map(), hk: new Map() };
    try {
        const cached = localStorage.getItem('market_holidays_cache');
        if (cached) {
            const raw = JSON.parse(cached);
            Object.keys(raw).forEach(m => holidayMaps[m] = new Map(Object.entries(raw[m])));
        }
    } catch(e) {}

    // 如果没有缓存，则使用基础备份
    if (holidayMaps.a.size === 0) {
        Object.keys(BACKUP_HOLIDAYS).forEach(m => holidayMaps[m] = new Map(Object.entries(BACKUP_HOLIDAYS[m])));
    }

    let viewYear = new Date().getFullYear();
    let viewMonth = new Date().getMonth();

    function toYMD(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function parseICS(text) {
        const holidays = new Map();
        const blocks = text.split('BEGIN:VEVENT');
        blocks.forEach(block => {
            const startMatch = block.match(/DTSTART(?:;VALUE=DATE)?:(\d{8})/);
            const summaryMatch = block.match(/SUMMARY:(.*)/);
            if (startMatch) {
                const d = startMatch[1];
                const key = `${d.slice(0, 4)}-${d.slice(4, 6)}-${d.slice(6, 8)}`;
                const summary = summaryMatch ? summaryMatch[1].trim() : "法定节假日";
                holidays.set(key, summary);
            }
        });
        return holidays;
    }

    async function syncData() {
        const statusEl = document.getElementById('sync-status');
        let anySuccess = false;
        for (const [market, url] of Object.entries(ICS_URLS)) {
            try {
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const text = await response.text();
                const fetched = parseICS(text);
                if (fetched.size > 0) {
                    fetched.forEach((val, key) => holidayMaps[market].set(key, val));
                    anySuccess = true;
                }
            } catch (err) {
                console.warn(`Failed to sync ${market}`);
            }
        }

        if (anySuccess) {
            // 保存到 LocalStorage 实现持久化
            const toStore = {};
            Object.keys(holidayMaps).forEach(m => toStore[m] = Object.fromEntries(holidayMaps[m]));
            localStorage.setItem('market_holidays_cache', JSON.stringify(toStore));
        }

        statusEl.textContent = `日历已就绪 (${new Date().toLocaleTimeString()})`;
        renderCalendar();
    }

    function updateClocks() {
        const now = new Date();
        const cnOpt = { timeZone: 'Asia/Shanghai', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
        const usOpt = { timeZone: 'America/New_York', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
        document.getElementById('cn-time').textContent = now.toLocaleTimeString('zh-CN', cnOpt);
        document.getElementById('us-time').textContent = now.toLocaleTimeString('zh-CN', usOpt);
        const dateOpt = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('cn-date').textContent = now.toLocaleDateString('zh-CN', { ...dateOpt, timeZone: 'Asia/Shanghai' });
        document.getElementById('us-date').textContent = now.toLocaleDateString('zh-CN', { ...dateOpt, timeZone: 'America/New_York' });
    }

    function initControls() {
        const yearSelect = document.getElementById('year-select');
        const monthSelect = document.getElementById('month-select');
        const todayBtn = document.getElementById('today-btn');
        for (let y = 2024; y <= 2027; y++) {
            const opt = document.createElement('option'); opt.value = y; opt.textContent = `${y}年`;
            if (y === viewYear) opt.selected = true; yearSelect.appendChild(opt);
        }
        for (let m = 0; m < 12; m++) {
            const opt = document.createElement('option'); opt.value = m; opt.textContent = `${m + 1}月`;
            if (m === viewMonth) opt.selected = true; monthSelect.appendChild(opt);
        }
        yearSelect.addEventListener('change', (e) => { viewYear = parseInt(e.target.value); renderCalendar(); });
        monthSelect.addEventListener('change', (e) => { viewMonth = parseInt(e.target.value); renderCalendar(); });
        todayBtn.addEventListener('click', () => {
            const n = new Date(); viewYear = n.getFullYear(); viewMonth = n.getMonth();
            yearSelect.value = viewYear; monthSelect.value = viewMonth; renderCalendar();
        });
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        while (grid.children.length > 7) grid.removeChild(grid.lastChild);
        const firstDay = new Date(viewYear, viewMonth, 1);
        const lastDay = new Date(viewYear, viewMonth + 1, 0);
        const startOffset = firstDay.getDay(); 
        const prevMonthLastDay = new Date(viewYear, viewMonth, 0).getDate();
        for (let i = startOffset - 1; i >= 0; i--) createDayCell(grid, prevMonthLastDay - i, true);
        for (let d = 1; d <= lastDay.getDate(); d++) createDayCell(grid, d, false, new Date(viewYear, viewMonth, d));
        const remaining = 42 - (grid.children.length - 7);
        for (let i = 1; i <= remaining; i++) createDayCell(grid, i, true);
    }

    function createDayCell(container, num, isOtherMonth, dateObj = null) {
        const cell = document.createElement('div');
        cell.className = 'day-cell' + (isOtherMonth ? ' other-month' : '');
        if (dateObj && dateObj.toDateString() === new Date().toDateString()) cell.classList.add('today');
        const numDiv = document.createElement('div');
        numDiv.className = 'day-num'; numDiv.textContent = num;
        cell.appendChild(numDiv);

        if (!isOtherMonth && dateObj) {
            const ymd = toYMD(dateObj);
            const day = dateObj.getDay();
            const isWeekend = (day === 0 || day === 6);

            addMarketTag(cell, 'A股', !isWeekend && !holidayMaps.a.has(ymd), 'tag-a', ymd, holidayMaps.a.get(ymd), isWeekend);
            addMarketTag(cell, '港股', !isWeekend && !holidayMaps.hk.has(ymd), 'tag-h', ymd, holidayMaps.hk.get(ymd), isWeekend);
            addMarketTag(cell, '美股', !isWeekend && !holidayMaps.us.has(ymd), 'tag-u', ymd, holidayMaps.us.get(ymd), isWeekend);
        }
        container.appendChild(cell);
    }

    function addMarketTag(parent, name, isOpen, colorClass, date, holidayReason, isWeekend) {
        const tag = document.createElement('div');
        const statusText = isOpen ? '开盘' : '休市';
        tag.className = `market-tag ${isOpen ? colorClass : 'tag-closed'}`;
        tag.textContent = `${name}${statusText}`;
        
        if (!isOpen) {
            const icon = document.createElement('span');
            icon.className = 'info-icon';
            icon.textContent = '?';
            const finalReason = isWeekend ? "周末休市" : (holidayReason || "法定节假日休市");
            icon.onclick = (e) => {
                e.stopPropagation();
                openModal(`${name} ${date}`, finalReason);
            };
            tag.appendChild(icon);
        }
        parent.appendChild(tag);
    }

    function openModal(title, desc) {
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-desc').textContent = desc;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    window.onclick = function(event) {
        const overlay = document.getElementById('modal-overlay');
        if (event.target == overlay) closeModal();
    }

    initControls();
    setInterval(updateClocks, 1000);
    updateClocks();
    syncData();
</script>

</body>
</html>
