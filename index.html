<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>开盘看板日历</title>
    
    <!-- PWA / 移动端桌面化配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="开盘日历">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/128/9014/9014576.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/128/9014/9014576.png">
    
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --apple-blue: #007aff;
            --apple-red: #ff3b30;
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
            --border-color: #e5e5ea;
            
            /* 三色底色样式 */
            --tag-a-bg: #6366f1; /* A股紫色 */
            --tag-h-bg: #f59e0b; /* 港股橙色 */
            --tag-u-bg: #10b981; /* 美股绿色 */
            --tag-closed-bg: #e5e5ea;
            --tag-closed-text: #8e8e93;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px; /* 恢复 Body 边距 */
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: 20px; /* 恢复容器圆角 */
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 20px; font-weight: 600; color: var(--apple-blue); }

        .clocks-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .clock-card {
            background: #fbfbfd;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .time-val {
            font-family: "SF Mono", "Courier New", monospace;
            font-size: 32px;
            font-weight: 700;
            margin: 5px 0;
            letter-spacing: -1px;
        }
        .date-val { font-size: 13px; color: var(--text-sub); }

        /* 日历控制 */
        .calendar-container {
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
        }
        .cal-header {
            padding: 12px 15px;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .cal-controls { display: flex; align-items: center; gap: 6px; }
        .cal-select, .cal-btn {
            appearance: none;
            background-color: #f2f2f7;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--apple-blue);
            cursor: pointer;
            outline: none;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--border-color);
            gap: 1px;
        }
        .weekday {
            background: #f9f9fb;
            padding: 8px 0;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-sub);
        }
        .day-cell {
            background: #fff;
            min-height: 100px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .day-num { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
        .today .day-num {
            color: #fff;
            background: var(--apple-red);
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .other-month { color: #d1d1d6; }
        .other-month .market-tag { opacity: 0.3; }

        .market-tag {
            font-size: 9px;
            font-weight: 600;
            padding: 2px 4px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            white-space: nowrap;
        }
        .tag-a { background-color: var(--tag-a-bg); color: white; }
        .tag-h { background-color: var(--tag-h-bg); color: white; }
        .tag-u { background-color: var(--tag-u-bg); color: white; }
        .tag-closed {
            background-color: var(--tag-closed-bg);
            color: var(--tag-closed-text);
        }

        .info-icon {
            display: inline-flex;
            width: 12px;
            height: 12px;
            background: rgba(0,0,0,0.08);
            color: #666;
            border-radius: 50%;
            justify-content: center;
            align-items: center;
            margin-left: 2px;
            cursor: pointer;
            font-size: 8px;
        }

        /* 弹窗样式 */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        #modal {
            background: #fff;
            padding: 24px;
            border-radius: 18px;
            max-width: 280px;
            width: 85%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        #modal h3 { font-size: 17px; margin-bottom: 10px; color: var(--apple-blue); }
        #modal p { font-size: 13px; color: #666; margin-bottom: 18px; line-height: 1.5; }
        .modal-btn {
            background: var(--apple-blue);
            color: #fff;
            border: none;
            padding: 8px 25px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
        }

        .sync-info {
            margin-top: 12px;
            font-size: 10px;
            color: var(--text-sub);
            text-align: right;
        }

        /* 移动端样式恢复：保留适当边距，更美观 */
        @media (max-width: 600px) {
            .clocks-row { 
                grid-template-columns: 1fr; 
                gap: 10px; 
            }
            .time-val { font-size: 28px; }
            .day-cell { min-height: 85px; padding: 4px 2px; }
            .market-tag { font-size: 8px; letter-spacing: -0.5px; padding: 1px 2px; }
            .weekday { font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>开盘看板日历</h1>
    </div>

    <div class="clocks-row">
        <div class="clock-card">
            <div class="date-val">北京时间 (CST)</div>
            <div id="cn-time" class="time-val">00:00:00</div>
            <div id="cn-date" class="date-val">正在同步...</div>
        </div>
        <div class="clock-card">
            <div class="date-val">美东时间 (EST/EDT)</div>
            <div id="us-time" class="time-val">00:00:00</div>
            <div id="us-date" class="date-val">正在同步...</div>
        </div>
    </div>

    <div class="calendar-container">
        <div class="cal-header">
            <div class="cal-controls">
                <select id="year-select" class="cal-select"></select>
                <select id="month-select" class="cal-select"></select>
                <button id="today-btn" class="cal-btn">今天</button>
            </div>
            <div style="font-size: 11px; color: var(--text-sub);">彩色：开盘 · 灰色：休市</div>
        </div>
        <div class="cal-grid" id="calendar-grid">
            <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
            <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div>
            <div class="weekday">六</div>
        </div>
    </div>

    <div class="sync-info" id="sync-status">正在初始化...</div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <h3 id="modal-title">休市详情</h3>
        <p id="modal-desc"></p>
        <button class="modal-btn" onclick="closeModal()">我知道了</button>
    </div>
</div>

<script>
    // 离线支持 - Service Worker
    if ('serviceWorker' in navigator) {
        const sw = `
            const CACHE_NAME = 'market-v7';
            self.addEventListener('install', e => {
                self.skipWaiting();
                e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll([location.href])));
            });
            self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
        `;
        const b = new Blob([sw], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(b)).catch(() => {});
    }

    const ICS_URLS = {
        a: "https://calendars.icloud.com/holidays/cn_zh.ics",
        us: "https://ics.calendarlabs.com/577/69d4aaa8/Nyse_Market_Holidays.ics",
        hk: "https://ics.calendarlabs.com/581/34611917/Hkex_Market_Holidays.ics"
    };

    const BACKUP_HOLIDAYS = {
        a: { "2026-05-01": "劳动节", "2026-05-04": "证券市场调休休市", "2026-05-05": "证券市场调休休市" },
        us: { "2026-05-25": "Memorial Day" },
        hk: { "2026-05-01": "劳动节", "2026-05-25": "佛诞" }
    };

    let holidayMaps = { a: new Map(), us: new Map(), hk: new Map() };
    const syncStatus = document.getElementById('sync-status');

    let viewYear = new Date().getFullYear();
    let viewMonth = new Date().getMonth();

    function toYMD(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function parseICS(text) {
        const holidays = new Map();
        const blocks = text.split('BEGIN:VEVENT');
        blocks.forEach(block => {
            const startMatch = block.match(/DTSTART(?:;VALUE=DATE)?:(\d{8})/);
            const summaryMatch = block.match(/SUMMARY:(.*)/);
            if (startMatch) {
                const d = startMatch[1];
                const key = `${d.slice(0, 4)}-${d.slice(4, 6)}-${d.slice(6, 8)}`;
                const summary = summaryMatch ? summaryMatch[1].trim() : "法定节假日";
                holidays.set(key, summary);
            }
        });
        return holidays;
    }

    function loadInitialData() {
        try {
            const cachedStr = localStorage.getItem('market_data_v7');
            if (cachedStr) {
                const raw = JSON.parse(cachedStr);
                Object.keys(raw).forEach(k => holidayMaps[k] = new Map(Object.entries(raw[k])));
                syncStatus.textContent = "已加载历史数据";
            } else {
                Object.keys(BACKUP_HOLIDAYS).forEach(k => holidayMaps[k] = new Map(Object.entries(BACKUP_HOLIDAYS[k])));
                syncStatus.textContent = "使用预设假期";
            }
        } catch(e) {
            Object.keys(BACKUP_HOLIDAYS).forEach(k => holidayMaps[k] = new Map(Object.entries(BACKUP_HOLIDAYS[k])));
            syncStatus.textContent = "数据就绪";
        }
    }

    async function syncData() {
        let anySuccess = false;
        syncStatus.textContent = "正在检查更新...";
        
        for (const [market, url] of Object.entries(ICS_URLS)) {
            try {
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl, { cache: "no-store" });
                const fetched = parseICS(await response.text());
                if (fetched.size > 0) {
                    fetched.forEach((val, key) => holidayMaps[market].set(key, val));
                    anySuccess = true;
                }
            } catch (err) {}
        }

        if (anySuccess) {
            const st = {};
            Object.keys(holidayMaps).forEach(k => st[k] = Object.fromEntries(holidayMaps[k]));
            localStorage.setItem('market_data_v7', JSON.stringify(st));
            syncStatus.textContent = `同步成功 (${new Date().toLocaleTimeString()})`;
        } else {
            syncStatus.textContent = "离线模式 (使用缓存数据)";
        }
        renderCalendar();
    }

    function updateClocks() {
        const now = new Date();
        const o = (tz) => ({ timeZone: tz, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('cn-time').textContent = now.toLocaleTimeString('zh-CN', o('Asia/Shanghai'));
        document.getElementById('us-time').textContent = now.toLocaleTimeString('zh-CN', o('America/New_York'));
        const d = (tz) => now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short', timeZone: tz });
        document.getElementById('cn-date').textContent = d('Asia/Shanghai');
        document.getElementById('us-date').textContent = d('America/New_York');
    }

    function initControls() {
        const yS = document.getElementById('year-select'), mS = document.getElementById('month-select'), tB = document.getElementById('today-btn');
        for (let y = 2024; y <= 2027; y++) {
            const o = document.createElement('option'); o.value = y; o.textContent = y+'年';
            if(y===viewYear) o.selected=true; yS.appendChild(o);
        }
        for (let m = 0; m < 12; m++) {
            const o = document.createElement('option'); o.value = m; o.textContent = (m+1)+'月';
            if(m===viewMonth) o.selected=true; mS.appendChild(o);
        }
        yS.onchange = (e) => { viewYear = +e.target.value; renderCalendar(); };
        mS.onchange = (e) => { viewMonth = +e.target.value; renderCalendar(); };
        tB.onclick = () => { const n=new Date(); viewYear=n.getFullYear(); viewMonth=n.getMonth(); yS.value=viewYear; mS.value=viewMonth; renderCalendar(); };
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        while(grid.children.length > 7) grid.removeChild(grid.lastChild);
        const first = new Date(viewYear, viewMonth, 1), last = new Date(viewYear, viewMonth + 1, 0);
        for (let i = first.getDay() - 1; i >= 0; i--) createDayCell(grid, new Date(viewYear, viewMonth, 0).getDate() - i, true);
        for (let d = 1; d <= last.getDate(); d++) createDayCell(grid, d, false, new Date(viewYear, viewMonth, d));
        const rem = 42 - (grid.children.length - 7);
        for (let i = 1; i <= rem; i++) createDayCell(grid, i, true);
    }

    function createDayCell(container, num, isO, dateObj = null) {
        const cell = document.createElement('div');
        cell.className = 'day-cell' + (isO ? ' other-month' : '');
        if (dateObj && dateObj.toDateString() === new Date().toDateString()) cell.classList.add('today');
        const nD = document.createElement('div'); nD.className = 'day-num'; nD.textContent = num; cell.appendChild(nD);

        if (!isO && dateObj) {
            const ymd = toYMD(dateObj), day = dateObj.getDay(), isW = (day === 0 || day === 6);
            addMarketTag(cell, 'A股', !isW && !holidayMaps.a.has(ymd), 'tag-a', ymd, holidayMaps.a.get(ymd), isW);
            addMarketTag(cell, '港股', !isW && !holidayMaps.hk.has(ymd), 'tag-h', ymd, holidayMaps.hk.get(ymd), isW);
            addMarketTag(cell, '美股', !isW && !holidayMaps.us.has(ymd), 'tag-u', ymd, holidayMaps.us.get(ymd), isW);
        }
        container.appendChild(cell);
    }

    function addMarketTag(parent, name, isOpen, colorClass, date, reason, isW) {
        const tag = document.createElement('div');
        tag.className = `market-tag ${isOpen ? colorClass : 'tag-closed'}`;
        tag.textContent = `${name}${isOpen ? '开盘' : '休市'}`;
        if (!isOpen) {
            const i = document.createElement('span'); i.className = 'info-icon'; i.textContent = '?';
            const finalReason = isW ? "周末休市" : (reason || "节假日休市");
            i.onclick = (e) => { e.stopPropagation(); openModal(`${name} ${date}`, finalReason); };
            tag.appendChild(i);
        }
        parent.appendChild(tag);
    }

    function openModal(t, d) {
        document.getElementById('modal-title').textContent = t;
        document.getElementById('modal-desc').textContent = d;
        document.getElementById('modal-overlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    window.onclick = e => { if (e.target == document.getElementById('modal-overlay')) closeModal(); };

    initControls();
    loadInitialData();
    updateClocks();
    renderCalendar();

    setInterval(updateClocks, 1000);
    syncData();
</script>

</body>
</html>
